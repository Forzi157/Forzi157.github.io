<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaoqi Yang - Homepage</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2A4B8D', // 学术风主色调（深蓝）
                        secondary: '#5C7099',
                        neutral: '#F5F7FA',
                        dark: '#2D3748'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .section-padding {
                @apply py-12 md:py-16;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1;
            }
        }
    </style>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-white text-dark font-sans">

    <main>
        <!-- 1. 个人简介区 (Home) -->
        <section id="home" class="bg-neutral section-padding">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row items-center gap-8">
                    <!-- 头像 -->
                    <div class="w-48 h-48 rounded-full overflow-hidden border-4 border-primary/20">
                        <img src="https://picsum.photos/200/200" alt="Your Profile Photo"
                            class="w-full h-full object-cover">
                    </div>
                    <!-- 个人信息 -->
                    <div class="text-center md:text-left">
                        <h1 class="text-4xl md:text-5xl font-bold text-primary mb-2">Shaoqi Yang</h1>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. 教育背景 (About) -->
        <section id="about" class="section-padding">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold text-primary mb-8 text-center">Education</h2>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 教育经历 1 -->
                    <div class="bg-white border border-gray-200 rounded-lg p-6 card-hover">
                        <div class="text-primary font-semibold text-lg mb-1">2023 - Present</div>
                        <h3 class="text-xl font-bold mb-2">Udergraduate in Software Engineering</h3>
                        <p class="text-secondary font-medium mb-2">Hainan University</p>
                    </div>

                </div>
            </div>
        </section>


        <!-- 3. 联系方式 (Contact) -->
        <section id="contact" class="section-padding">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold text-primary mb-8 text-center">Contact Me</h2>
                <div class="max-w-2xl mx-auto bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
                    <div class="space-y-4">
                        <div class="flex items-center">
                            <div class="text-primary text-xl mr-4">
                                <i class="fa-solid fa-envelope"></i>
                            </div>
                            <p>your.email@university.edu</p>
                        </div>
                        <div class="flex items-center">
                            <div class="text-primary text-xl mr-4">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <p>+1 (123) 456-7890</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 7. 页脚 -->
    <footer class="bg-dark text-white py-8">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <p>&copy; 2024 Your Name. All rights reserved.</p>
                </div>
                <div class="flex space-x-6">
                    <a href="#home" class="hover:text-primary/80 transition-colors">Home</a>
                    <a href="#about" class="hover:text-primary/80 transition-colors">About</a>
                    <a href="#research" class="hover:text-primary/80 transition-colors">Research</a>
                    <a href="#contact" class="hover:text-primary/80 transition-colors">Contact</a>
                </div>
            </div>
        </div>
    </footer>

</body>

</html>
